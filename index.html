<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TLS AV — Espacios</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --azul: #1a6fa8; --azul-oscuro: #0f4d7a; --azul-claro: #e8f3fb;
    --texto: #1a1a1a; --gris: #f4f6f9; --borde: #e0e0e0;
    --verde: #22c55e; --amarillo: #f59e0b; --rojo: #ef4444;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--gris); color: var(--texto); min-height: 100vh; }

  header { background: var(--azul); padding: 0 16px; height: 52px; display: flex;
    align-items: center; justify-content: space-between; position: sticky; top: 0;
    z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .logo { width: 28px; height: 28px; background: rgba(255,255,255,0.2); border-radius: 8px;
    display: flex; align-items: center; justify-content: center; }
  header h1 { color: #fff; font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
  header h1 span { font-weight: 400; opacity: 0.7; font-size: 13px; margin-left: 6px; }
  .header-count { background: rgba(255,255,255,0.2); color: white; font-size: 11px;
    font-weight: 600; padding: 3px 8px; border-radius: 20px; min-width: 24px; text-align: center; }

  .search-wrap { padding: 10px 14px 0; background: var(--gris);
    position: sticky; top: 52px; z-index: 99; }
  .search-inner { position: relative; }
  .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
    color: #aaa; pointer-events: none; }
  .search-inner input { width: 100%; padding: 10px 34px 10px 34px;
    border: 1.5px solid var(--borde); border-radius: 12px; font-size: 14px;
    background: #fff; outline: none; transition: border-color 0.15s; -webkit-appearance: none; }
  .search-inner input:focus { border-color: var(--azul); }
  .search-inner input::placeholder { color: #bbb; }
  .clear-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    background: #ddd; border: none; border-radius: 50%; width: 18px; height: 18px;
    font-size: 10px; cursor: pointer; display: none; align-items: center;
    justify-content: center; color: #666; }
  .clear-btn.visible { display: flex; }

  .filtros-wrap { padding: 8px 14px 6px; background: var(--gris);
    position: sticky; top: 102px; z-index: 98; }
  .filtros { display: flex; gap: 6px; overflow-x: auto; -webkit-overflow-scrolling: touch;
    scrollbar-width: none; padding-bottom: 2px; }
  .filtros::-webkit-scrollbar { display: none; }
  .filtro-btn { font-size: 12px; font-weight: 500; padding: 5px 13px; border-radius: 20px;
    border: 1.5px solid var(--borde); background: #fff; cursor: pointer; color: #666;
    white-space: nowrap; flex-shrink: 0; transition: all 0.15s; }
  .filtro-btn.active { background: var(--azul); color: #fff; border-color: var(--azul); }

  .lista { padding: 8px 14px 32px; display: flex; flex-direction: column; gap: 8px; }

  .card { background: #fff; border-radius: 14px; border: 1.5px solid var(--borde); overflow: hidden; }
  .card-header { padding: 12px 14px 10px; }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .card-sala { font-size: 15px; font-weight: 700; color: var(--texto); line-height: 1.3; }
  .card-meta { display: flex; align-items: center; gap: 6px; margin-top: 5px; font-size: 11px; color: #999; }
  .card-meta-sep { color: #ddd; }

  .estado-badge { display: flex; align-items: center; gap: 4px; flex-shrink: 0;
    font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 20px; margin-top: 1px; }
  .estado-badge.completa  { background: #dcfce7; color: #16a34a; }
  .estado-badge.parcial   { background: #fef9c3; color: #b45309; }
  .estado-badge.pendiente { background: #fee2e2; color: #dc2626; }
  .estado-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .completa .estado-dot  { background: var(--verde); }
  .parcial .estado-dot   { background: var(--amarillo); }
  .pendiente .estado-dot { background: var(--rojo); }

  .card-docs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
    padding: 8px 12px 12px; border-top: 1px solid #f3f3f3; }
  .doc-btn { display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 8px 4px 7px; border-radius: 10px; border: 1.5px solid var(--borde);
    background: #fafafa; text-decoration: none; transition: all 0.15s; }
  .doc-btn:active { transform: scale(0.95); }
  .doc-btn.activo { background: var(--azul-claro); border-color: #b3d6f0; }
  .doc-btn.inactivo { opacity: 0.35; pointer-events: none; }
  .doc-icon { font-size: 18px; line-height: 1; }
  .doc-label { font-size: 10px; font-weight: 600; color: #888; }
  .doc-btn.activo .doc-label { color: var(--azul-oscuro); }

  .card-otros { padding: 0 12px 10px; display: flex; justify-content: flex-end; }
  .otros-btn { font-size: 11px; text-decoration: none; padding: 4px 10px;
    border: 1px solid #b3d6f0; border-radius: 8px;
    background: var(--azul-claro); color: var(--azul); }

  .grupo-cliente { font-size: 11px; font-weight: 700; color: #bbb;
    text-transform: uppercase; letter-spacing: 0.08em; padding: 6px 2px 4px; margin-top: 4px; }

  .estado-center { text-align: center; padding: 48px 20px; color: #bbb;
    font-size: 14px; line-height: 1.6; }
  .estado-center .icono { font-size: 36px; margin-bottom: 10px; }

  .skeleton { animation: pulse 1.4s ease-in-out infinite; }
  .sk-card { background: #fff; border-radius: 14px; border: 1.5px solid var(--borde); padding: 14px; }
  .sk-line { background: #eee; border-radius: 6px; height: 12px; margin-bottom: 8px; }
  .sk-line.w60 { width: 60%; } .sk-line.w40 { width: 40%; } .sk-line.w80 { width: 80%; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="white">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
      </svg>
    </div>
    <h1>TLS AV <span>Espacios</span></h1>
  </div>
  <div class="header-count" id="header-count">—</div>
</header>

<div class="search-wrap">
  <div class="search-inner">
    <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none"
      stroke="currentColor" stroke-width="2.5">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="search" id="buscador" placeholder="Buscar sala o cliente..."
      autocomplete="off" oninput="onBuscar(this)">
    <button class="clear-btn" id="clear-btn" onclick="limpiarBusqueda()">✕</button>
  </div>
</div>

<div class="filtros-wrap">
  <div class="filtros" id="filtros">
    <button class="filtro-btn active" onclick="setFiltro('todas', this)">Todas</button>
  </div>
</div>

<div class="lista" id="lista">
  <div class="sk-card skeleton"><div class="sk-line w40"></div><div class="sk-line w80"></div><div class="sk-line w60"></div></div>
  <div class="sk-card skeleton"><div class="sk-line w40"></div><div class="sk-line w80"></div><div class="sk-line w60"></div></div>
  <div class="sk-card skeleton"><div class="sk-line w40"></div><div class="sk-line w60"></div><div class="sk-line w80"></div></div>
</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQUR-hDCz-qg8uuvjkgXcFk6YvLNEVwye2efCf4C2JfhbdTzTdNJufln5TtEGttk2HnTA0TUA1HhN-o/pub?gid=1274081954&single=true&output=csv";

let todasSalas = [];
let filtroActivo = "todas";
let queryActual = "";

function parseCSV(text) {
  const lines = text.trim().split("\n");
  // Fila 1: título, Fila 2: descripción, Fila 3: cabecera real, Fila 4+: datos
  const cabecera = parseLine(lines[2]);
  return lines.slice(3).map(l => {
    const cols = parseLine(l);
    const obj = {};
    cabecera.forEach((k, i) => obj[k.trim()] = (cols[i] || "").trim());
    return obj;
  });
}

function parseLine(line) {
  const cols = [];
  let cur = "", inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { inQ = !inQ; }
    else if (ch === ',' && !inQ) { cols.push(cur); cur = ""; }
    else { cur += ch; }
  }
  cols.push(cur);
  return cols;
}

function estadoClase(v) {
  const s = (v || "").toLowerCase();
  if (s.includes("completa")) return "completa";
  if (s.includes("parcial"))  return "parcial";
  return "pendiente";
}
function estadoLabel(c) {
  if (c === "completa") return "Completa";
  if (c === "parcial")  return "Parcial";
  return "Pendiente";
}
function esLink(v) {
  return v && (v.startsWith("http://") || v.startsWith("https://"));
}

fetch(CSV_URL)
  .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.text(); })
  .then(text => {
    const filas = parseCSV(text);
    todasSalas = filas
      .map(f => ({
        cliente:    f["Cliente"]        || "",
        sala:       f["Sala"]           || "",
        provincia:  f["Provincia"]      || "",
        esquema:    f["Esquema"]        || "",
        ips:        f["IPs"]            || "",
        manual:     f["Manual de sala"] || "",
        contactos:  f["Contactos"]      || "",
        otros:      f["+ Otros docs"]   || "",
        estado:     estadoClase(f["Estado"] || ""),
        actualizado:f["Actualizado"]    || "",
      }))
      .filter(s => s.cliente.trim() !== "" && s.sala.trim() !== ""
        && !s.cliente.toLowerCase().includes("leyenda")
        && !s.cliente.toLowerCase().startsWith("completa")
        && !s.cliente.toLowerCase().startsWith("parcial")
        && !s.cliente.toLowerCase().startsWith("pendiente"));

    const provincias = [...new Set(todasSalas.map(s => s.provincia).filter(Boolean))].sort();
    const filtrosDiv = document.getElementById("filtros");
    while (filtrosDiv.children.length > 1) filtrosDiv.removeChild(filtrosDiv.lastChild);
    provincias.forEach(p => {
      const btn = document.createElement("button");
      btn.className = "filtro-btn";
      btn.textContent = p;
      btn.onclick = () => setFiltro(p, btn);
      filtrosDiv.appendChild(btn);
    });

    filtrar();
  })
  .catch(err => {
    document.getElementById("lista").innerHTML = `
      <div class="estado-center">
        <div class="icono">⚠️</div>
        No se pudieron cargar los datos.<br>
        <small style="color:#ccc">${err}</small>
      </div>`;
  });

function setFiltro(prov, btn) {
  filtroActivo = prov;
  document.querySelectorAll(".filtro-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  filtrar();
}
function onBuscar(input) {
  queryActual = input.value;
  document.getElementById("clear-btn").classList.toggle("visible", queryActual.length > 0);
  filtrar();
}
function limpiarBusqueda() {
  document.getElementById("buscador").value = "";
  queryActual = "";
  document.getElementById("clear-btn").classList.remove("visible");
  filtrar();
}
function filtrar() {
  const q = queryActual.toLowerCase();
  const res = todasSalas.filter(s => {
    const matchProv = filtroActivo === "todas" || s.provincia === filtroActivo;
    const matchQ = !q || s.sala.toLowerCase().includes(q) || s.cliente.toLowerCase().includes(q);
    return matchProv && matchQ;
  });
  render(res);
}
function docBtn(label, icon, url) {
  if (esLink(url)) {
    return `<a class="doc-btn activo" href="${url}" target="_blank">
      <span class="doc-icon">${icon}</span>
      <span class="doc-label">${label}</span>
    </a>`;
  }
  return `<div class="doc-btn inactivo">
    <span class="doc-icon">${icon}</span>
    <span class="doc-label">${label}</span>
  </div>`;
}
function render(lista) {
  const n = lista.length;
  document.getElementById("header-count").textContent = n + (n === 1 ? " espacio" : " espacios");
  const cont = document.getElementById("lista");
  if (!lista.length) {
    cont.innerHTML = `<div class="estado-center"><div class="icono">🔍</div>Sin resultados</div>`;
    return;
  }
  const grupos = {};
  lista.forEach(s => {
    if (!grupos[s.cliente]) grupos[s.cliente] = [];
    grupos[s.cliente].push(s);
  });
  cont.innerHTML = Object.entries(grupos).map(([cliente, salas]) => `
    <div class="grupo-cliente">${cliente}</div>
    ${salas.map(s => `
      <div class="card">
        <div class="card-header">
          <div class="card-top">
            <div>
              <div class="card-sala">${s.sala}</div>
              <div class="card-meta">
                ${s.provincia ? `<span>${s.provincia}</span>` : ""}
                ${s.actualizado ? `<span class="card-meta-sep">·</span><span>Act. ${s.actualizado}</span>` : ""}
              </div>
            </div>
            <div class="estado-badge ${s.estado}">
              <span class="estado-dot"></span>${estadoLabel(s.estado)}
            </div>
          </div>
        </div>
        <div class="card-docs">
          ${docBtn("Esquema",  "🗂️", s.esquema)}
          ${docBtn("IPs",      "🖧",  s.ips)}
          ${docBtn("Manual",   "📘", s.manual)}
          ${docBtn("Contactos","👤", s.contactos)}
        </div>
        ${esLink(s.otros) ? `
          <div class="card-otros">
            <a class="otros-btn" href="${s.otros}" target="_blank">+ Otros</a>
          </div>` : ""}
      </div>
    `).join("")}
  `).join("");
}
</script>
</body>
</html>
